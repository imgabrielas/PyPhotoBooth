<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  @keyframes pbPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes pbGlow { 0%,100% { box-shadow: 0 0 0 1px rgba(97,208,255,0.35), 0 0 28px rgba(97,208,255,0.30), inset 0 0 44px rgba(97,208,255,0.06); } 50% { box-shadow: 0 0 0 1px rgba(97,208,255,0.55), 0 0 40px rgba(97,208,255,0.45), inset 0 0 44px rgba(97,208,255,0.10); } }
  @keyframes pbToast { 0% { transform: translateY(14px) scale(0.96); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
  @keyframes pbModalIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>
</helmet>
<div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:40px 20px; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; background:radial-gradient(1200px 800px at 50% -10%, #f7f5ee 0%, #efece3 55%, #e7e4d9 100%);">

  <div style="position:relative; width:1280px; max-width:100%; border-radius:18px; overflow:hidden; background:#f2f0e9; box-shadow:0 24px 60px rgba(40,38,30,0.18), 0 1px 0 rgba(255,255,255,0.6) inset; border:1px solid rgba(0,0,0,0.08);">

    <!-- title bar -->
    <div style="height:46px; display:flex; align-items:center; gap:14px; padding:0 18px; background:#eae7dd; border-bottom:1px solid rgba(0,0,0,0.07);">
      <div style="display:flex; gap:8px;">
        <span style="width:12px; height:12px; border-radius:50%; background:#ff5f57;"></span>
        <span style="width:12px; height:12px; border-radius:50%; background:#febc2e;"></span>
        <span style="width:12px; height:12px; border-radius:50%; background:#28c840;"></span>
      </div>
      <div style="flex:1; text-align:center; font-size:13px; letter-spacing:0.04em; color:#6b6960;">
        Python Photobooth&nbsp;&nbsp;<span style="display:{{ smileDisplay }}; color:#1488bf; font-weight:700;">SMILE!!</span>
      </div>
      <div style="width:64px;"></div>
    </div>

    <!-- SCREEN 1 -->
    <div style="display:{{ screen1Display }}; height:624px;">
      <!-- left: camera -->
      <div style="flex:0 0 70%; max-width:70%; padding:22px; display:flex; flex-direction:column; gap:14px;">
        <div style="flex:1; position:relative; border-radius:16px; overflow:hidden; background:radial-gradient(120% 120% at 50% 30%, #eceae1 0%, #ddd9cd 100%); border:1px solid rgba(0,0,0,0.08);">
          <!-- faint feed texture -->
          <div style="position:absolute; inset:0; background-image:repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0 14px, rgba(0,0,0,0) 14px 28px);"></div>
          <!-- LIVE dot -->
          <div style="position:absolute; top:16px; left:16px; display:flex; align-items:center; gap:7px; padding:5px 11px; border-radius:999px; background:rgba(255,255,255,0.78); border:1px solid rgba(0,0,0,0.08);">
            <span style="width:8px; height:8px; border-radius:50%; background:#ff5f57; animation:pbPulse 1.4s ease-in-out infinite;"></span>
            <span style="font-size:10px; letter-spacing:0.16em; color:#5a584f;">LIVE</span>
          </div>
          <!-- capture frame wrapper -->
          <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div style="width:600px; max-width:92%;">
              <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                <span style="font-size:14px; font-weight:500; color:#1488bf; letter-spacing:0.02em;">Picture 1 of 3</span>
                <span style="font-size:14px; font-weight:700; color:#0f1830; background:#61d0ff; padding:3px 13px; border-radius:999px;">3s</span>
              </div>
              <div style="height:348px; border:2px solid #61d0ff; animation:pbGlow 2.4s ease-in-out infinite;"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- right: strip preview -->
      <div style="flex:0 0 30%; max-width:30%; padding:16px; background:#ebe8de; border-left:1px solid rgba(0,0,0,0.07); display:flex; flex-direction:column;">
        <div style="display:flex; flex-direction:column; gap:20px;">
          <div style="height:150px; border:1px solid rgba(0,0,0,0.1); background-color:#e7e4da; background-image:repeating-linear-gradient(135deg, rgba(0,0,0,0.045) 0 10px, rgba(0,0,0,0) 10px 20px); display:flex; align-items:center; justify-content:center;">
            <span style="font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:0.12em; color:#a8a499;">PHOTO 01</span>
          </div>
          <div style="height:150px; border:1px solid rgba(0,0,0,0.1); background-color:#e7e4da; background-image:repeating-linear-gradient(135deg, rgba(0,0,0,0.045) 0 10px, rgba(0,0,0,0) 10px 20px); display:flex; align-items:center; justify-content:center;">
            <span style="font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:0.12em; color:#a8a499;">PHOTO 02</span>
          </div>
          <div style="height:150px; border:1px solid rgba(0,0,0,0.1); background-color:#e7e4da; background-image:repeating-linear-gradient(135deg, rgba(0,0,0,0.045) 0 10px, rgba(0,0,0,0) 10px 20px); display:flex; align-items:center; justify-content:center;">
            <span style="font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:0.12em; color:#a8a499;">PHOTO 03</span>
          </div>
        </div>
      </div>
    </div>

    <!-- SCREEN 2 -->
    <div style="display:{{ screen2Display }}; height:624px;">
      <!-- left: completed strip -->
      <div style="flex:0 0 60%; max-width:60%; padding:22px; display:flex; align-items:center; justify-content:center; background:radial-gradient(120% 120% at 50% 20%, #efece3 0%, #e6e2d7 100%); border-right:1px solid rgba(0,0,0,0.07);">
        <div style="width:316px; padding:16px; border-radius:14px; background:#fbfaf6; border:1px solid rgba(0,0,0,0.1); box-shadow:0 16px 40px rgba(40,38,30,0.13); display:flex; flex-direction:column;">
          <div style="display:flex; flex-direction:column; gap:20px;">
            <div style="height:150px; border:1px solid rgba(0,0,0,0.1); background-color:#e7e4da; background-image:repeating-linear-gradient(135deg, rgba(0,0,0,0.045) 0 10px, rgba(0,0,0,0) 10px 20px); display:flex; align-items:center; justify-content:center;">
              <span style="font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:0.12em; color:#a8a499;">PHOTO 01</span>
            </div>
            <div style="height:150px; border:1px solid rgba(0,0,0,0.1); background-color:#e7e4da; background-image:repeating-linear-gradient(135deg, rgba(0,0,0,0.045) 0 10px, rgba(0,0,0,0) 10px 20px); display:flex; align-items:center; justify-content:center;">
              <span style="font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:0.12em; color:#a8a499;">PHOTO 02</span>
            </div>
            <div style="height:150px; border:1px solid rgba(0,0,0,0.1); background-color:#e7e4da; background-image:repeating-linear-gradient(135deg, rgba(0,0,0,0.045) 0 10px, rgba(0,0,0,0) 10px 20px); display:flex; align-items:center; justify-content:center;">
              <span style="font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:0.12em; color:#a8a499;">PHOTO 03</span>
            </div>
          </div>
          <!-- overlays -->
          <div style="text-align:center; margin-top:18px; min-height:42px;">
            <div style="font-size:13px; letter-spacing:0.08em; font-weight:500; color:{{ dateColor }};">{{ dateText }}</div>
            <div style="font-size:13px; margin-top:6px; font-style:{{ messageItalic }}; color:{{ messageColor }};">{{ messageText }}</div>
          </div>
        </div>
      </div>
      <!-- right: options -->
      <div style="flex:0 0 40%; max-width:40%; padding:34px 32px; display:flex; flex-direction:column;">
        <div style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:34px; font-weight:600; line-height:1; color:#2a2820; text-align:center; margin-bottom:32px;">Options</div>

        <button onClick="{{ toggleDate }}" style="cursor:pointer; width:100%; padding:15px 18px; margin-bottom:18px; border-radius:12px; border:1.5px solid #1488bf; background:{{ dateBtnBg }}; color:#1488bf; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:15px; font-weight:500; text-align:left; display:flex; align-items:center; justify-content:space-between;">
          <span>{{ dateBtnLabel }}</span>
          <span style="font-size:18px; line-height:1;">+</span>
        </button>

        <div style="margin-bottom:18px;">
          <label style="display:block; font-size:12px; letter-spacing:0.04em; color:#6b6960; margin-bottom:8px;">Custom text</label>
          <input value="{{ inputValue }}" onChange="{{ onText }}" placeholder="Write something..." style="width:100%; padding:14px 18px; border-radius:999px; border:1.5px solid rgba(0,0,0,0.18); background:#ffffff; color:#2a2820; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:15px; outline:none;" />
        </div>

        <button onClick="{{ doSave }}" style="cursor:pointer; width:100%; padding:15px 18px; margin-bottom:18px; border-radius:12px; border:none; background:#61d0ff; color:#0d1426; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:16px; font-weight:700; box-shadow:0 8px 24px rgba(97,208,255,0.25);">Save</button>

        <button onClick="{{ askQuit }}" style="cursor:pointer; width:100%; padding:15px 18px; border-radius:12px; border:none; background:#66030b; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:15px; font-weight:500;">Quit</button>
      </div>
    </div>

    <!-- POPUP 1: Saved toast -->
    <div style="display:{{ savedDisplay }}; position:absolute; left:0; right:0; bottom:34px; align-items:center; justify-content:center; pointer-events:none;">
      <div style="pointer-events:auto; display:flex; align-items:center; gap:14px; padding:16px 22px; border-radius:14px; background:#fbfaf6; border:1px solid rgba(20,136,191,0.4); box-shadow:0 18px 50px rgba(0,0,0,0.5); animation:pbToast 0.3s cubic-bezier(0.2,0.8,0.2,1);">
        <span style="width:30px; height:30px; border-radius:50%; background:rgba(20,136,191,0.14); display:flex; align-items:center; justify-content:center; color:#1488bf; font-size:16px; font-weight:700;">✓</span>
        <span style="font-size:16px; font-weight:600; color:#1488bf;">Saved! :))</span>
        <button onClick="{{ closeSaved }}" style="cursor:pointer; margin-left:6px; border:none; background:transparent; color:#9a978c; font-size:16px; line-height:1; padding:2px 4px;">✕</button>
      </div>
    </div>

    <!-- POPUP 2: Quit confirm -->
    <div style="display:{{ quitDisplay }}; position:absolute; inset:0; align-items:center; justify-content:center; background:rgba(40,38,32,0.42); backdrop-filter:blur(3px);">
      <div style="width:420px; padding:30px; border-radius:18px; background:#faf8f3; border:1px solid rgba(0,0,0,0.1); box-shadow:0 30px 70px rgba(0,0,0,0.6); animation:pbModalIn 0.22s cubic-bezier(0.2,0.8,0.2,1);">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
          <span style="width:34px; height:34px; border-radius:50%; background:rgba(102,3,11,0.1); display:flex; align-items:center; justify-content:center; color:#66030b; font-size:18px;">!</span>
          <span style="font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:#66030b;">Unsaved changes</span>
        </div>
        <p style="margin:0 0 26px; font-size:17px; line-height:1.5; color:#2a2820;">Are you sure you would like to quit? The picture <b style="color:#171717;">HAS NOT</b> been saved.</p>
        <div style="display:flex; gap:12px;">
          <button onClick="{{ cancelQuit }}" style="cursor:pointer; flex:1; padding:14px; border-radius:11px; border:1.5px solid rgba(0,0,0,0.18); background:transparent; color:#2a2820; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:15px; font-weight:500;">Cancel</button>
          <button onClick="{{ confirmQuit }}" style="cursor:pointer; flex:1; padding:14px; border-radius:11px; border:none; background:#66030b; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:15px; font-weight:600;">Quit without saving</button>
        </div>
      </div>
    </div>

  </div>

  <!-- screen switcher -->
  <div style="display:flex; gap:4px; padding:4px; border-radius:999px; background:#e8e5db; border:1px solid rgba(0,0,0,0.1);">
    <button onClick="{{ goS1 }}" style="border:none; cursor:pointer; padding:8px 20px; border-radius:999px; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; font-weight:500; background:{{ tog1Bg }}; color:{{ tog1Color }};">Capture</button>
    <button onClick="{{ goS2 }}" style="border:none; cursor:pointer; padding:8px 20px; border-radius:999px; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; font-weight:500; background:{{ tog2Bg }}; color:{{ tog2Color }};">Edit &amp; Save</button>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { screen: 1, showDate: false, customText: '', popup: null };

  save() {
    this.setState({ popup: 'saved' });
    clearTimeout(this._t);
    this._t = setTimeout(() => {
      this.setState(s => (s.popup === 'saved' ? { popup: null } : null));
    }, 3200);
  }

  renderVals() {
    const s = this.state;
    const today = '27/06/2026';
    const hasText = s.customText.trim().length > 0;
    const dateOn = s.showDate;
    return {
      screen1Display: s.screen === 1 ? 'flex' : 'none',
      screen2Display: s.screen === 2 ? 'flex' : 'none',
      smileDisplay: s.screen === 1 ? 'inline' : 'none',
      tog1Bg: s.screen === 1 ? '#61d0ff' : 'transparent',
      tog1Color: s.screen === 1 ? '#0f1830' : '#6b6960',
      tog2Bg: s.screen === 2 ? '#61d0ff' : 'transparent',
      tog2Color: s.screen === 2 ? '#0f1830' : '#6b6960',
      dateText: dateOn ? today : 'DD/MM/YYYY',
      dateColor: dateOn ? '#2a2820' : '#b0ada3',
      messageText: hasText ? s.customText : 'Your message here...',
      messageColor: hasText ? '#2a2820' : '#b0ada3',
      messageItalic: hasText ? 'normal' : 'italic',
      dateBtnBg: dateOn ? 'rgba(97,208,255,0.16)' : 'transparent',
      dateBtnLabel: dateOn ? 'Date added' : 'Add Date',
      inputValue: s.customText,
      onText: (e) => this.setState({ customText: e.target.value }),
      goS1: () => this.setState({ screen: 1, popup: null }),
      goS2: () => this.setState({ screen: 2 }),
      toggleDate: () => this.setState(st => ({ showDate: !st.showDate })),
      doSave: () => this.save(),
      askQuit: () => this.setState({ popup: 'quit' }),
      closeSaved: () => this.setState({ popup: null }),
      cancelQuit: () => this.setState({ popup: null }),
      confirmQuit: () => this.setState({ popup: null, screen: 1, showDate: false, customText: '' }),
      savedDisplay: s.popup === 'saved' ? 'flex' : 'none',
      quitDisplay: s.popup === 'quit' ? 'flex' : 'none',
    };
  }
}
</script>
</body>
</html>
